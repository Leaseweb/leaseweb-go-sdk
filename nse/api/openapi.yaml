paths:
  /servers/{serverId}/networkInterfaces:
    get:
      description: |
        List all network interfaces for this server, including their current status.
      operationId: getNetworkInterfaceList
      parameters:
      - description: The ID of a server
        example: "12345"
        explode: false
        in: path
        name: serverId
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              example:
                _metadata:
                  limit: 10
                  offset: 0
                  totalCount: 1
                networkInterfaces:
                - linkSpeed: 100Mbps
                  operStatus: OPEN
                  status: OPEN
                  switchInterface: "33"
                  switchName: EVO-AA11-1
                  type: PUBLIC
              schema:
                $ref: '#/components/schemas/getNetworkInterfaceListResult'
          description: Ok.
        "401":
          content:
            application/json:
              example:
                correlationId: 289346a1-3eaf-4da4-b707-62ef12eb08be
                errorCode: "401"
                errorMessage: You are not authorized to view this resource.
              schema:
                $ref: '#/components/schemas/errorResult'
          description: Not Authorized.
        "403":
