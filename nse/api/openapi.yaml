      description: Forbidden.
    "500":
      content:
        application/json:
          example:
            correlationId: 289346a1-3eaf-4da4-b707-62ef12eb08be
            errorCode: "500"
            errorMessage: '''The API could not handle your request at this time.'
          schema:
            $ref: '#/components/schemas/errorResult'
      description: Internal Server Error.
  schemas:
    _metadata:
      description: Metadata about the collection
      example:
        offset: 0
        limit: 5
        totalCount: 2
      properties:
        totalCount:
          description: Total amount of orders in this collection
          example: 2
          type: number
        offset:
          default: 0
          description: The offset used to generate this response
          example: 0
          type: number
        limit:
          default: 5
          description: The limit used to generate this response
          example: 5
          type: number
      title: metadata
      type: object
    networkInterface:
      example:
        switchInterface: switchInterface
        switchName: switchName
        operStatus: operStatus
        linkSpeed: linkSpeed
        type: type
        status: status
      properties:
        linkSpeed:
          description: The link speed
          type: string
        operStatus:
          description: The operational status
          type: string
        status:
          description: The administrative status
          type: string
        switchInterface:
          description: The switch port number
          type: string
        switchName:
          description: The switch name
          type: string
        type:
          description: The network type
          type: string
      type: object
    getNetworkInterfaceListResult:
      example:
        networkInterfaces:
        - switchInterface: switchInterface
          switchName: switchName
          operStatus: operStatus
          linkSpeed: linkSpeed
          type: type
          status: status
        - switchInterface: switchInterface
          switchName: switchName
          operStatus: operStatus
          linkSpeed: linkSpeed
          type: type
          status: status
        _metadata:
          offset: 0
          limit: 5
          totalCount: 2
      properties:
        _metadata:
          $ref: '#/components/schemas/_metadata'
        networkInterfaces:
          description: An array of network interfaces
          items:
            $ref: '#/components/schemas/networkInterface'
          type: array
      type: object
    errorResult:
      example:
        errorMessage: errorMessage
        errorCode: errorCode
        correlationId: correlationId
        errorDetails:
          key:
          - errorDetails
          - errorDetails
      properties:
        correlationId:
          description: The correlation ID of the current request.
          type: string
        errorCode:
          description: The error code.
          type: string
        errorMessage:
          description: A human friendly description of the error.
          type: string
        errorDetails:
          additionalProperties:
            items:
              type: string
            type: array
          type: object
      type: object
    networkType:
      description: Type of network
      enum:
      - INTERNAL
      - PUBLIC
      - REMOTE_MANAGEMENT
      example: INTERNAL
      type: string
    getDdosNotificationSettingResult:
      example:
        nulling: nulling
        scrubbing: scrubbing
      properties:
        nulling:
          description: Email notifications for nulling events
          type: string
        scrubbing:
          description: Email notifications for scrubbing events
          type: string
      type: object
    updateDdosNotificationSettingOpts:
      properties:
        nulling:
          description: Enable or disable email notifications for nulling events
          enum:
          - ENABLED
          - DISABLED
          type: string
        scrubbing:
          description: Enable or disable email notifications for nulling events
          enum:
          - ENABLED
          - DISABLED
          type: string
      type: object
  securitySchemes:
    ApiKeyAuth:
      description: API key authentication by setting `X-LSW-Auth` header.
      in: header
      name: X-LSW-Auth
      type: apiKey
    BearerAuth:
      scheme: bearer
      type: http
